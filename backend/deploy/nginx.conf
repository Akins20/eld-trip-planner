# nginx reverse proxy for the ELD Trip Planner API.
# Install to /etc/nginx/sites-available/eld-backend and symlink into sites-enabled,
# then run `sudo certbot --nginx -d api.YOUR_DOMAIN.com` to add HTTPS automatically.

upstream eld_backend {
    server unix:/run/eld-backend/gunicorn.sock;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.YOUR_DOMAIN.com;

    client_max_body_size 1m;
    gzip on;
    gzip_types application/json text/css application/javascript;

    location /static/ {
        alias /opt/eld-trip-planner/backend/staticfiles/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://eld_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 100

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
# pycodestyle, pyflakes, isort, bugbear, pyupgrade, warnings
select = ["E", "F", "I", "B", "UP", "W"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = ["test_*.py"]
testpaths = ["trips/tests"]
addopts = "-q --strict-markers"
filterwarnings = ["ignore:No directory at:UserWarning"]

[tool.coverage.run]
source = ["trips"]
omit = ["*/tests/*", "*/migrations/*", "config/*"]

[tool.coverage.report]
show_missing = true
